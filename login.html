<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educado LMS | Login</title>

  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <main class="auth-screen">

    <div class="auth-overlay"></div>

    <section class="auth-container">

      <!-- LEFT BRAND -->
      <div class="auth-brand">
        <img src="Images/edu-logo.svg" alt="Educado Logo">
        <h2>Educado LMS</h2>
        <p>Learn smarter. Grow faster.</p>
      </div>

      <!-- RIGHT FORM -->
      <div class="auth-box">

        <!-- SWITCH -->
        <div class="auth-switch">
          <button class="switch-btn active" data-form="login">Login</button>
          <button class="switch-btn" data-form="signup">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <form class="auth-form login-form active">
          <h3>Welcome Back</h3>

          <input type="email" placeholder="Email Address" required>
          <input type="password" placeholder="Password" required>

          <div class="form-links">
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="auth-btn">Login</button>

          <div class="social-login">
            <span>or continue with</span>
            <div class="social-icons">
              <a href="#">Google</a>
              <a href="#">LinkedIn</a>
            </div>
          </div>
        </form>

        <!-- SIGNUP FORM -->
        <form class="auth-form signup-form">
          <h3>Create Account</h3>

          <input type="text" placeholder="Full Name" required>
          <input type="email" placeholder="Email Address" required>
          <input type="password" placeholder="Create Password" required>

          <button type="submit" class="auth-btn">Create Account</button>

          <div class="social-login">
            <span>or sign up with</span>
            <div class="social-icons">
              <a href="#">Google</a>
              <a href="#">LinkedIn</a>
            </div>
          </div>
        </form>

      </div>

    </section>

  </main>

  <script src="js/auth.js"></script>
</body>
</html>
